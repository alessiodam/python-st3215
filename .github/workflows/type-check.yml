name: Type Check

on:
  push:
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/type-check.yml"
  pull_request:
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/type-check.yml"

jobs:
  type-check:
    name: Type Checking with mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mypy
          pip install -r requirements.txt
          pip install .
      - name: Run mypy
        run: mypy src/
